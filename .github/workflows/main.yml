name: Builld and Deploy SFTP
on:
  push:
    branches: ['main']

concurrency:
  group: deploy-test
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: latest
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (Astro)
        run: npm run build

      - name: Upload pawequira.de
        uses: pressidium/lftp-mirror-action@v1
        with:
          host: ${{ secrets.SFTP_HOST }}
          port: 22
          user: ${{ secrets.SFTP_USERNAME }}
          pass: ${{ secrets.SFTP_PASSWORD }}
          onlyNewer: true
          settings: 'sftp:auto-confirm yes'
          localDir: './dist/'
          remoteDir: './pawequira.de/'
          options: '--delete'
